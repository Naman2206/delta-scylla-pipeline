<svg xmlns="http://www.w3.org/2000/svg" width="700" height="280" viewBox="0 0 700 280">
  <style>
    .title { font: bold 18px sans-serif; fill: #2c3e50; }
    .box { fill: #f1f3f5; stroke: #57606f; stroke-width: 2; rx: 10; }
    .text { font: 13px sans-serif; fill: #2f3542; }
    .line { stroke: #5865f2; stroke-width: 4; }
    .marker { fill: #57606f; }
  </style>
  <text class="title" x="20" y="30">Delta Lake Version History (Sample)</text>
  <rect class="box" x="40" y="50" width="620" height="200"/>
  <path class="line" d="M90 200 L180 120 L270 160 L360 110 L450 150 L540 90 L630 130"/>
  <circle cx="90" cy="200" r="6" class="marker"/>
  <circle cx="180" cy="120" r="6" class="marker"/>
  <circle cx="270" cy="160" r="6" class="marker"/>
  <circle cx="360" cy="110" r="6" class="marker"/>
  <circle cx="450" cy="150" r="6" class="marker"/>
  <circle cx="540" cy="90" r="6" class="marker"/>
  <circle cx="630" cy="130" r="6" class="marker"/>
  <text class="text" x="80" y="220">v1: initial load</text>
  <text class="text" x="170" y="95">v2: dedupe</text>
  <text class="text" x="260" y="180">v3: fix schema</text>
  <text class="text" x="350" y="90">v4: add flags</text>
  <text class="text" x="440" y="170">v5: add checks</text>
  <text class="text" x="530" y="70">v6: refactor</text>
  <text class="text" x="620" y="150">v7: final</text>
</svg>
